<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
    
    <!-- Indigo/Purple Theme Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />   <!-- indigo-400 -->
      <stop offset="50%" stop-color="#6366f1" />  <!-- indigo-500 -->
      <stop offset="100%" stop-color="#a855f7" /> <!-- purple-500 -->
    </linearGradient>

    <!-- Glowing Effect Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded App Icon Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer Decorative Ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#primaryGrad)" stroke-width="4" stroke-opacity="0.2" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#primaryGrad)" stroke-width="2" stroke-dasharray="10, 15" stroke-opacity="0.4" />

  <!-- Dumbbell Icon Group with Glow -->
  <g filter="url(#glow)" transform="translate(256, 256) rotate(-45)">
    <!-- Dumbbell Bar -->
    <rect x="-140" y="-14" width="280" height="28" rx="8" fill="url(#primaryGrad)" />
    
    <!-- Inner Plates (Small) -->
    <rect x="-90" y="-45" width="20" height="90" rx="6" fill="url(#primaryGrad)" opacity="0.9" />
    <rect x="70" y="-45" width="20" height="90" rx="6" fill="url(#primaryGrad)" opacity="0.9" />
    
    <!-- Medium Plates -->
    <rect x="-115" y="-60" width="20" height="120" rx="8" fill="url(#primaryGrad)" />
    <rect x="95" y="-60" width="20" height="120" rx="8" fill="url(#primaryGrad)" />

    <!-- Outer Plates (Large) -->
    <rect x="-140" y="-75" width="20" height="150" rx="10" fill="url(#primaryGrad)" opacity="0.8" />
    <rect x="120" y="-75" width="20" height="150" rx="10" fill="url(#primaryGrad)" opacity="0.8" />
    
    <!-- Collars -->
    <rect x="-65" y="-20" width="10" height="40" rx="3" fill="#ffffff" opacity="0.8" />
    <rect x="55" y="-20" width="10" height="40" rx="3" fill="#ffffff" opacity="0.8" />
  </g>

  <!-- Glowing Core Accent -->
  <circle cx="256" cy="256" r="24" fill="#ffffff" opacity="0.9" filter="url(#glow)" />
</svg>
